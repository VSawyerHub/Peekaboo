<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peekaboo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0d0d0f;
      --surface:  #16161a;
      --border:   #2a2a32;
      --accent:   #ff3c5f;
      --accent2:  #7c3aed;
      --text:     #e8e8f0;
      --muted:    #6b6b80;
      --green:    #22c55e;
      --radius:   10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo span { font-size: 18px; }

    /* ── Toggle overlay ── */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .toggle-label { font-size: 12px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 22px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: var(--muted);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .toggle input:checked + .slider { background: rgba(255,60,95,0.25); }
    .toggle input:checked + .slider::before { transform: translateX(18px); background: var(--accent); }

    /* ── Scrollable main ── */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    main::-webkit-scrollbar { width: 4px; }
    main::-webkit-scrollbar-track { background: transparent; }
    main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Section ── */
    section { display: flex; flex-direction: column; gap: 8px; }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* ── Input ── */
    input[type="text"], input[type="number"], input[type="password"], select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, select:focus { border-color: var(--accent2); }
    label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 3px; }

    /* ── Row ── */
    .row { display: flex; gap: 8px; align-items: flex-end; }
    .row > * { flex: 1; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 9px 14px;
      border: none;
      border-radius: 6px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--border); color: var(--text); }
    .btn-purple { background: var(--accent2); color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Effect buttons grid ── */
    .effects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .effect-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 12px 10px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
    }
    .effect-btn:hover { border-color: var(--accent); background: rgba(255,60,95,0.08); }
    .effect-btn:active { transform: scale(0.95); }
    .effect-btn .icon { font-size: 22px; }

    /* ── Twitch status ── */
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }
    .status-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }
    .status-text { color: var(--muted); }

    /* ── Hotkey badge ── */
    kbd {
      background: var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .hotkeys { display: flex; gap: 6px; flex-wrap: wrap; }

    /* ── Log ── */
    #log {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      height: 70px;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 2px;
    }
    .log-line { line-height: 1.5; }
    .log-line.ok  { color: var(--green); }
    .log-line.err { color: var(--accent); }
    .log-line.info { color: var(--accent2); }
  </style>
</head>
<body>

<header>
  <div class="logo">peek<span>👻</span>boo</div>
  <div class="toggle-row">
    <span class="toggle-label">OVERLAY</span>
    <label class="toggle">
      <input type="checkbox" id="overlay-toggle" />
      <span class="slider"></span>
    </label>
  </div>
</header>

<main>

  <!-- Twitch -->
  <section>
    <div class="section-title">Twitch Connection</div>
    <div class="card">
      <div class="status-row">
        <div class="status-dot" id="twitch-dot"></div>
        <span class="status-text" id="twitch-status">Not connected</span>
      </div>
      <div>
        <label>Channel name</label>
        <input type="text" id="twitch-channel" placeholder="your_channel" />
      </div>
      <div>
        <label>OAuth token <small style="color:var(--muted)">(chat:read scope)</small></label>
        <input type="password" id="twitch-token" placeholder="oauth:xxxxxxxxxxxx" />
      </div>
      <div class="row">
        <button class="btn btn-purple" id="twitch-connect-btn">Connect</button>
        <button class="btn btn-secondary" id="twitch-disconnect-btn" disabled>Disconnect</button>
      </div>
    </div>
  </section>

  <!-- Twitch triggers -->
  <section>
    <div class="section-title">Twitch Triggers</div>
    <div class="card">
      <div class="row">
        <div>
          <label>Bits threshold</label>
          <input type="number" id="bits-threshold" value="100" min="1" />
        </div>
        <div>
          <label>Effect</label>
          <select id="bits-effect">
            <option value="jumpscare">Jumpscare</option>
            <option value="shake">Shake</option>
            <option value="glitch">Glitch</option>
            <option value="bigtext">Big Text</option>
          </select>
        </div>
      </div>
      <small style="font-family:monospace;font-size:10px;color:var(--muted)">
        Subs always trigger jumpscare. Bits trigger if ≥ threshold.
      </small>
    </div>
  </section>

  <!-- Manual effects -->
  <section>
    <div class="section-title">Manual Fire</div>
    <div class="effects-grid">
      <button class="effect-btn" data-effect="jumpscare">
        <span class="icon">👻</span>Jumpscare
      </button>
      <button class="effect-btn" data-effect="shake">
        <span class="icon">📳</span>Shake
      </button>
      <button class="effect-btn" data-effect="glitch">
        <span class="icon">📺</span>Glitch
      </button>
      <button class="effect-btn" data-effect="bigtext">
        <span class="icon">💬</span>Big Text
      </button>
    </div>
  </section>

  <!-- Jumpscare config -->
  <section>
    <div class="section-title">Jumpscare Config</div>
    <div class="card">
      <div>
        <label>Image / GIF URL</label>
        <input type="text" id="scare-image" placeholder="https://... or local path" value="" />
      </div>
      <div>
        <label>Sound URL</label>
        <input type="text" id="scare-sound" placeholder="https://... .mp3 / .wav" value="" />
      </div>
      <div class="row">
        <div>
          <label>Volume (0–1)</label>
          <input type="number" id="scare-volume" value="0.9" min="0" max="1" step="0.1" />
        </div>
        <div>
          <label>Duration (ms)</label>
          <input type="number" id="scare-duration" value="2000" min="500" step="100" />
        </div>
      </div>
    </div>
  </section>

  <!-- Big text config -->
  <section>
    <div class="section-title">Big Text Config</div>
    <div class="card">
      <div>
        <label>Text content</label>
        <input type="text" id="bigtext-content" value="BOO!" />
      </div>
    </div>
  </section>

  <!-- Hotkeys -->
  <section>
    <div class="section-title">Hotkeys</div>
    <div class="hotkeys">
      <span><kbd>ESC</kbd> Kill overlay</span>
      <span><kbd>Ctrl+Shift+P</kbd> Toggle overlay</span>
    </div>
  </section>

  <!-- Log -->
  <section>
    <div class="section-title">Activity Log</div>
    <div id="log"></div>
  </section>

</main>

<script type="module">
  import { invoke }  from "https://unpkg.com/@tauri-apps/api@1/tauri";
  import { appWindow } from "https://unpkg.com/@tauri-apps/api@1/window";

  // ── utils ────────────────────────────────────────────────────────────────
  const $ = (id) => document.getElementById(id);
  const log = (msg, type = "info") => {
    const el = document.createElement("div");
    el.className = `log-line ${type}`;
    el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
    $("log").prepend(el);
  };

  // ── overlay toggle ───────────────────────────────────────────────────────
  $("overlay-toggle").addEventListener("change", (e) => {
    invoke("set_overlay_visible", { visible: e.target.checked });
    log(e.target.checked ? "Overlay enabled" : "Overlay disabled", e.target.checked ? "ok" : "info");
  });

  // ── build effect payload ─────────────────────────────────────────────────
  function buildPayload(type) {
    switch (type) {
      case "jumpscare":
        return {
          image:    $("scare-image").value,
          sound:    $("scare-sound").value,
          volume:   parseFloat($("scare-volume").value),
          duration: parseInt($("scare-duration").value),
        };
      case "bigtext":
        return { text: $("bigtext-content").value };
      default:
        return {};
    }
  }

  function fireEffect(type) {
    // Enable overlay if not already on
    const toggle = $("overlay-toggle");
    if (!toggle.checked) {
      toggle.checked = true;
      invoke("set_overlay_visible", { visible: true });
    }
    invoke("trigger_effect", { effect: type, payload: buildPayload(type) });
    log(`Fired: ${type}`, "ok");
  }

  // ── manual buttons ───────────────────────────────────────────────────────
  document.querySelectorAll(".effect-btn").forEach((btn) => {
    btn.addEventListener("click", () => fireEffect(btn.dataset.effect));
  });

  // ── twitch IRC via WebSocket ─────────────────────────────────────────────
  let twitchWS = null;

  function connectTwitch() {
    const channel = $("twitch-channel").value.trim().toLowerCase();
    const token   = $("twitch-token").value.trim();
    if (!channel || !token) { log("Channel or token missing", "err"); return; }

    twitchWS = new WebSocket("wss://irc-ws.chat.twitch.tv:443");

    twitchWS.onopen = () => {
      twitchWS.send(`PASS ${token}`);
      twitchWS.send(`NICK ${channel}`);
      twitchWS.send("CAP REQ :twitch.tv/tags twitch.tv/commands");
      twitchWS.send(`JOIN #${channel}`);
    };

    twitchWS.onmessage = ({ data }) => {
      // Keep alive
      if (data.startsWith("PING")) { twitchWS.send("PONG :tmi.twitch.tv"); return; }

      // Parse tags
      const tagMatch = data.match(/^@([^ ]+)/);
      const tags = {};
      if (tagMatch) {
        tagMatch[1].split(";").forEach((t) => {
          const [k, v] = t.split("=");
          tags[k] = v;
        });
      }

      // Sub / resub / gifted sub
      const msgId = tags["msg-id"];
      if (["sub", "resub", "subgift"].includes(msgId)) {
        log(`Sub event! Triggering jumpscare`, "ok");
        fireEffect("jumpscare");
        return;
      }

      // Bits
      const bits = parseInt(tags["bits"] ?? "0");
      const threshold = parseInt($("bits-threshold").value ?? "100");
      if (bits >= threshold) {
        const effect = $("bits-effect").value;
        log(`${bits} bits! Triggering ${effect}`, "ok");
        fireEffect(effect);
      }
    };

    twitchWS.onclose = () => {
      setTwitchUI(false);
      log("Twitch disconnected", "err");
    };

    twitchWS.onerror = () => log("Twitch connection error", "err");

    // Confirm connected after a short handshake delay
    setTimeout(() => {
      if (twitchWS?.readyState === WebSocket.OPEN) {
        setTwitchUI(true);
        log(`Connected to #${channel}`, "ok");
      }
    }, 1500);
  }

  function disconnectTwitch() {
    twitchWS?.close();
    twitchWS = null;
    setTwitchUI(false);
    log("Disconnected from Twitch", "info");
  }

  function setTwitchUI(connected) {
    $("twitch-dot").classList.toggle("connected", connected);
    $("twitch-status").textContent = connected
      ? `Connected — #${$("twitch-channel").value}`
      : "Not connected";
    $("twitch-connect-btn").disabled = connected;
    $("twitch-disconnect-btn").disabled = !connected;
  }

  $("twitch-connect-btn").addEventListener("click", connectTwitch);
  $("twitch-disconnect-btn").addEventListener("click", disconnectTwitch);

  log("Peekaboo ready 👻", "ok");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peekaboo Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      background: transparent;
      overflow: hidden;
      pointer-events: none; /* click-through fallback for CSS layer */
      user-select: none;
    }

    /* ── Jumpscare layer ── */
    #jumpscare {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0);
      opacity: 0;
      transition: opacity 0.05s;
      z-index: 100;
    }
    #jumpscare.active {
      opacity: 1;
      background: rgba(0, 0, 0, 0.85);
      animation: scare-flash 0.08s steps(1) 3;
    }
    #jumpscare img, #jumpscare video {
      max-width: 80vw;
      max-height: 80vh;
      object-fit: contain;
      animation: scare-scale 0.15s cubic-bezier(0.36, 0.07, 0.19, 0.97);
      border-radius: 4px;
    }

    @keyframes scare-scale {
      0%   { transform: scale(0.4) rotate(-3deg); }
      60%  { transform: scale(1.08) rotate(1deg); }
      100% { transform: scale(1) rotate(0deg); }
    }
    @keyframes scare-flash {
      0%   { background: rgba(200, 0, 0, 0.7); }
      50%  { background: rgba(0, 0, 0, 0.9); }
      100% { background: rgba(200, 0, 0, 0.5); }
    }

    /* ── Screen shake ── */
    @keyframes screen-shake {
      0%   { transform: translate(0, 0) rotate(0deg); }
      10%  { transform: translate(-8px, -6px) rotate(-0.5deg); }
      20%  { transform: translate(10px, 5px) rotate(0.5deg); }
      30%  { transform: translate(-9px, 7px) rotate(-0.3deg); }
      40%  { transform: translate(7px, -8px) rotate(0.4deg); }
      50%  { transform: translate(-5px, 6px) rotate(-0.2deg); }
      60%  { transform: translate(8px, -4px) rotate(0.3deg); }
      70%  { transform: translate(-6px, 3px) rotate(-0.1deg); }
      80%  { transform: translate(5px, -2px) rotate(0.2deg); }
      90%  { transform: translate(-3px, 1px) rotate(0deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }
    body.shaking {
      animation: screen-shake 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    /* ── Glitch layer ── */
    #glitch-layer {
      position: fixed;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      z-index: 90;
      background: transparent;
    }
    #glitch-layer.active {
      animation: glitch-anim 0.8s steps(1) forwards;
    }
    @keyframes glitch-anim {
      0%   { opacity: 0; }
      5%   { opacity: 1; background: repeating-linear-gradient(0deg, rgba(255,0,60,0.15) 0px, transparent 2px, transparent 4px); }
      10%  { background: repeating-linear-gradient(0deg, rgba(0,255,200,0.12) 0px, transparent 3px, transparent 5px); clip-path: inset(30% 0 40% 0); }
      20%  { clip-path: inset(10% 0 70% 0); background: rgba(255,0,0,0.08); }
      30%  { clip-path: inset(60% 0 5% 0); }
      40%  { clip-path: inset(0% 0 0% 0); background: repeating-linear-gradient(90deg, rgba(0,100,255,0.1) 0px, transparent 2px, transparent 6px); }
      60%  { opacity: 0.5; }
      80%  { opacity: 0.2; }
      100% { opacity: 0; }
    }

    /* ── Big text ── */
    #bigtext {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      z-index: 95;
    }
    #bigtext.active {
      animation: bigtext-anim 2.5s ease forwards;
    }
    #bigtext span {
      font-family: 'Impact', 'Arial Black', sans-serif;
      font-size: clamp(80px, 15vw, 200px);
      font-weight: 900;
      color: #fff;
      text-shadow:
        0 0 40px rgba(255,50,50,0.9),
        4px 4px 0 #000,
        -4px -4px 0 #000,
        4px -4px 0 #000,
        -4px 4px 0 #000;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      text-align: center;
      padding: 0 2rem;
      animation: bigtext-bounce 0.3s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }
    @keyframes bigtext-anim {
      0%   { opacity: 0; }
      8%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes bigtext-bounce {
      0%   { transform: scale(0) rotate(-5deg); }
      60%  { transform: scale(1.1) rotate(1deg); }
      100% { transform: scale(1) rotate(0); }
    }
  </style>
</head>
<body>

  <!-- Jumpscare -->
  <div id="jumpscare">
    <img id="scare-img" src="" alt="" />
  </div>

  <!-- Glitch overlay -->
  <div id="glitch-layer"></div>

  <!-- Big text -->
  <div id="bigtext"><span id="bigtext-content">BOO!</span></div>

  <script type="module">
    import { listen } from "https://unpkg.com/@tauri-apps/api@1/event";

    const $ = (id) => document.getElementById(id);

    // ── helpers ──────────────────────────────────────────────────────────────

    function playAudio(src, volume = 1.0) {
      if (!src) return;
      const a = new Audio(src);
      a.volume = Math.min(1, Math.max(0, volume));
      a.play().catch(() => {});
    }

    function triggerClass(el, cls, duration) {
      el.classList.remove(cls);
      void el.offsetWidth; // force reflow
      el.classList.add(cls);
      setTimeout(() => el.classList.remove(cls), duration);
    }

    // ── effects ───────────────────────────────────────────────────────────────

    const effects = {
      jumpscare({ image, sound, volume = 1, duration = 2000 }) {
        const img = $("scare-img");
        img.src = image || "";
        playAudio(sound, volume);
        triggerClass($("jumpscare"), "active", duration);
        // shake too
        triggerClass(document.body, "shaking", 600);
      },

      shake({ duration = 600 }) {
        triggerClass(document.body, "shaking", duration);
      },

      glitch({ duration = 800 }) {
        triggerClass($("glitch-layer"), "active", duration);
      },

      bigtext({ text = "BOO!", duration = 2500, sound, volume = 1 }) {
        $("bigtext-content").textContent = text;
        playAudio(sound, volume);
        triggerClass($("bigtext"), "active", duration);
      },
    };

    // ── Tauri event listener ─────────────────────────────────────────────────

    await listen("effect", ({ payload }) => {
      const handler = effects[payload.type];
      if (handler) handler(payload.payload ?? {});
    });

    // Emergency kill: hide everything instantly
    await listen("kill", () => {
      document.querySelectorAll(".active").forEach((el) =>
        el.classList.remove("active")
      );
    });
  </script>
</body>
</html>
